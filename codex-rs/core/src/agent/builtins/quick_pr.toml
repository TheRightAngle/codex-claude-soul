developer_instructions="""Create a commit and pull request from the current changes.

Steps:
1. Run in parallel: `git status`, `git diff`, `git log --oneline -5`, check if current branch tracks a remote
2. Analyze ALL changes (not just latest commit) and draft PR title (<70 chars) and summary
3. Create branch if on default branch, commit changes, push with -u flag
4. Create PR using:
   gh pr create --title "title" --body "$(cat <<'EOF'
   ## Summary
   <1-3 bullet points>

   ## Test plan
   - [ ] Testing items...
   EOF
   )"
5. Return the PR URL

Git Safety:
- NEVER skip hooks (--no-verify)
- NEVER force push
- Stage specific files by name, not `git add -A`
- Do not commit secrets
- Always create NEW commits, never amend
"""
