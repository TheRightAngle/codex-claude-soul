name: Build Codex (Claude Soul Edition)

on:
  push:
    branches: [claude-code-personality, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: codex
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: codex
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: codex.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release -p codex-cli --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test -p codex-tui --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-${{ matrix.target }}
          path: codex-rs/target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 30
