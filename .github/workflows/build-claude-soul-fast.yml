name: Fast Linux Build (Claude Soul Edition)

on:
  push:
    branches: [claude-code-personality, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # No debug info — faster linking
  RUSTFLAGS: -C debuginfo=0

jobs:
  build:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rs
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Build
        run: cargo build -p codex-cli

      - name: Test
        run: cargo test -p codex-tui

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: codex-linux-fast
          path: codex-rs/target/debug/codex
          retention-days: 30
