name: Fast Linux Build (Claude Soul Edition)

on:
  push:
    branches: [claude-code-personality, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # No debug info + use mold linker — dramatically faster linking
  RUSTFLAGS: -C debuginfo=0 -C linker=clang -C link-arg=--ld-path=/usr/bin/mold

jobs:
  build:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: fast-linux-cargo-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: fast-linux-cargo-

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config libcap-dev mold clang

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build
        run: cargo build -p codex-cli

      - name: Test
        run: cargo nextest run -p codex-tui

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: codex-linux-fast
          path: codex-rs/target/debug/codex
          retention-days: 30
